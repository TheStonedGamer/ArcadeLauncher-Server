<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ArcadeLauncher — Game Requests</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #171c24;
    --panel-2: #1f2630;
    --border: #2a323d;
    --text: #e6e9ee;
    --muted: #8b95a4;
    --accent: #5b8def;
    --accent-2: #3f6fd1;
    --good: #3fb950;
    --warn: #d29922;
    --bad: #f85149;
    --info: #58a6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }
  a { color: var(--accent); }
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .topbar .spacer { flex: 1; }
  .topbar .who { color: var(--muted); font-size: 13px; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 22px 64px; }
  button {
    font: inherit; cursor: pointer;
    background: var(--accent); color: #fff; border: none;
    padding: 9px 16px; border-radius: 7px; font-weight: 600;
    transition: background .12s ease;
  }
  button:hover { background: var(--accent-2); }
  button:disabled { opacity: .5; cursor: default; }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  button.ghost:hover { background: var(--panel-2); color: var(--text); }
  button.small { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
  input, textarea {
    font: inherit; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    padding: 10px 12px; border-radius: 7px; width: 100%;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 6px; }

  /* Login */
  .login-card {
    max-width: 360px; margin: 8vh auto 0;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px;
  }
  .login-card h2 { margin: 0 0 4px; font-size: 20px; }
  .login-card p.sub { margin: 0 0 22px; color: var(--muted); font-size: 13px; }
  .field { margin-bottom: 16px; }
  .err { color: var(--bad); font-size: 13px; min-height: 18px; margin-top: 8px; }

  /* Search */
  .search-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .search-row input { flex: 1; }
  .hint { color: var(--muted); font-size: 12px; margin: 0 0 22px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
  }
  .card .cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: var(--panel-2); display: block; }
  .card .cover.placeholder { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }
  .card .body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .card .name { font-weight: 600; font-size: 13px; line-height: 1.3; }
  .card .meta { color: var(--muted); font-size: 11px; }
  .card button { margin-top: auto; }

  /* Board */
  .section-head { display: flex; align-items: baseline; gap: 12px; margin: 36px 0 16px; }
  .section-head h2 { font-size: 16px; margin: 0; }
  .section-head .count { color: var(--muted); font-size: 13px; }
  .req {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 12px;
  }
  .req .vote {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    min-width: 54px;
  }
  .req .vote .btn-vote {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    width: 44px; height: 36px; border-radius: 7px; font-size: 16px; line-height: 1;
  }
  .req .vote .btn-vote.voted { background: var(--accent); border-color: var(--accent); color: #fff; }
  .req .vote .num { font-weight: 700; font-size: 15px; }
  .req .vote .lbl { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
  .req .thumb { width: 52px; height: 70px; border-radius: 6px; object-fit: cover; background: var(--panel-2); flex-shrink: 0; }
  .req .info { flex: 1; min-width: 0; }
  .req .info .t { font-weight: 600; font-size: 15px; }
  .req .info .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .req .info .note { font-size: 13px; margin-top: 8px; color: #c5ccd6; font-style: italic; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .4px; padding: 3px 8px; border-radius: 20px; vertical-align: middle;
  }
  .badge.pending { background: rgba(210,153,34,.18); color: var(--warn); }
  .badge.approved { background: rgba(88,166,255,.18); color: var(--info); }
  .badge.fulfilled { background: rgba(63,185,80,.18); color: var(--good); }
  .badge.declined { background: rgba(248,81,73,.18); color: var(--bad); }
  .req .admin { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
  .hidden { display: none !important; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; max-width: 440px; width: 100%;
  }
  .modal h3 { margin: 0 0 4px; }
  .modal .modal-sub { color: var(--muted); font-size: 13px; margin: 0 0 18px; }
  .modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 12px 20px; border-radius: 8px; z-index: 80; box-shadow: 0 6px 24px rgba(0,0,0,.4);
    opacity: 0; transition: opacity .2s ease; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ============ LOGIN VIEW ============ -->
<div id="loginView">
  <div class="login-card">
    <h2>Game Requests</h2>
    <p class="sub">Sign in with your ArcadeLauncher account.</p>
    <form id="loginForm">
      <div class="field">
        <label for="lUser">Username or email</label>
        <input id="lUser" autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label for="lPass">Password</label>
        <input id="lPass" type="password" autocomplete="current-password" />
      </div>
      <div class="field">
        <label for="lTotp">2FA code <span style="opacity:.6">(if enabled)</span></label>
        <input id="lTotp" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" />
      </div>
      <button type="submit" id="lBtn" style="width:100%">Sign in</button>
      <div class="err" id="lErr"></div>
    </form>
  </div>
</div>

<!-- ============ APP VIEW ============ -->
<div id="appView" class="hidden">
  <div class="topbar">
    <h1>🎮 Game Requests</h1>
    <div class="spacer"></div>
    <span class="who" id="whoami"></span>
    <button class="ghost small" id="logoutBtn">Sign out</button>
  </div>
  <div class="wrap">
    <div class="search-row">
      <input id="searchBox" placeholder="Search for a game to request…" />
      <button id="searchBtn">Search</button>
    </div>
    <p class="hint">Find a release on IGDB, then request it. If someone already requested it, your request becomes an upvote.</p>
    <div id="searchResults" class="grid"></div>

    <div class="section-head">
      <h2>Request board</h2>
      <span class="count" id="boardCount"></span>
    </div>
    <div id="board"></div>
  </div>
</div>

<!-- ============ REQUEST MODAL ============ -->
<div id="modalBg" class="modal-bg hidden">
  <div class="modal">
    <h3 id="mTitle">Request game</h3>
    <p class="modal-sub" id="mSub"></p>
    <label for="mNote">Note <span style="opacity:.6">(optional)</span></label>
    <textarea id="mNote" rows="3" placeholder="Anything you want the admin to know…"></textarea>
    <div class="actions">
      <button class="ghost" id="mCancel">Cancel</button>
      <button id="mConfirm">Submit request</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let IS_ADMIN = false;
let pendingRequest = null;

function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 2600);
}

async function api(path, opts = {}) {
  const res = await fetch(path, { credentials: "same-origin", ...opts });
  let data = null;
  try { data = await res.json(); } catch (_) {}
  if (!res.ok) {
    const msg = (data && data.error) || res.statusText || "Request failed";
    throw new Error(msg);
  }
  return data;
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function yearOf(ts) {
  if (!ts) return "";
  const d = new Date(ts * 1000);
  const y = d.getUTCFullYear();
  return (y && y > 1970) ? String(y) : "";
}

/* ---------------- Auth ---------------- */
async function checkSession() {
  try {
    const me = await api("/api/me");
    if (me.signedIn) { enterApp(me); return true; }
  } catch (_) {}
  return false;
}

function enterApp(me) {
  IS_ADMIN = !!me.isAdmin;
  $("whoami").textContent = me.username + (IS_ADMIN ? " · admin" : "");
  $("loginView").classList.add("hidden");
  $("appView").classList.remove("hidden");
  loadBoard();
}

$("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  $("lErr").textContent = "";
  $("lBtn").disabled = true;
  const body = new URLSearchParams();
  body.set("username", $("lUser").value.trim());
  body.set("password", $("lPass").value);
  body.set("totp_code", $("lTotp").value.trim());
  try {
    await api("/login", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString(),
    });
    const me = await api("/api/me");
    enterApp(me);
  } catch (err) {
    $("lErr").textContent = err.message;
  } finally {
    $("lBtn").disabled = false;
  }
});

$("logoutBtn").addEventListener("click", async () => {
  try { await api("/logout", { method: "POST" }); } catch (_) {}
  location.reload();
});

/* ---------------- Search ---------------- */
async function doSearch() {
  const q = $("searchBox").value.trim();
  const out = $("searchResults");
  if (q.length < 2) { out.innerHTML = ""; return; }
  out.innerHTML = '<p class="hint">Searching…</p>';
  try {
    const data = await api("/api/search?q=" + encodeURIComponent(q));
    const results = data.results || [];
    if (!results.length) { out.innerHTML = '<p class="empty">No matches found.</p>'; return; }
    out.innerHTML = "";
    for (const r of results) out.appendChild(searchCard(r));
  } catch (err) {
    out.innerHTML = '<p class="empty">' + esc(err.message) + "</p>";
  }
}

function searchCard(r) {
  const el = document.createElement("div");
  el.className = "card";
  const yr = yearOf(r.release_date);
  const cover = r.cover_url
    ? '<img class="cover" src="' + esc(r.cover_url) + '" alt="" loading="lazy" />'
    : '<div class="cover placeholder">No art</div>';
  el.innerHTML =
    cover +
    '<div class="body">' +
      '<div class="name">' + esc(r.name) + "</div>" +
      '<div class="meta">' + esc([yr, r.platforms].filter(Boolean).join(" · ")) + "</div>" +
      '<button class="small">Request this</button>' +
    "</div>";
  el.querySelector("button").addEventListener("click", () => openModal(r));
  return el;
}

$("searchBtn").addEventListener("click", doSearch);
$("searchBox").addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });

/* ---------------- Request modal ---------------- */
function openModal(r) {
  pendingRequest = r;
  $("mTitle").textContent = "Request “" + r.name + "”";
  const yr = yearOf(r.release_date);
  $("mSub").textContent = [yr, r.platforms].filter(Boolean).join(" · ");
  $("mNote").value = "";
  $("modalBg").classList.remove("hidden");
  $("mNote").focus();
}
function closeModal() { $("modalBg").classList.add("hidden"); pendingRequest = null; }
$("mCancel").addEventListener("click", closeModal);
$("modalBg").addEventListener("click", (e) => { if (e.target === $("modalBg")) closeModal(); });

$("mConfirm").addEventListener("click", async () => {
  if (!pendingRequest) return;
  const r = pendingRequest;
  $("mConfirm").disabled = true;
  try {
    await api("/api/requests", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        igdb_id: r.igdb_id,
        title: r.name,
        platform: r.platforms || "",
        cover_url: r.cover_url || "",
        release_date: r.release_date || 0,
        summary: r.summary || "",
        note: $("mNote").value.trim(),
      }),
    });
    closeModal();
    toast("Request submitted!");
    loadBoard();
  } catch (err) {
    toast(err.message);
  } finally {
    $("mConfirm").disabled = false;
  }
});

/* ---------------- Board ---------------- */
async function loadBoard() {
  const board = $("board");
  try {
    const data = await api("/api/requests");
    IS_ADMIN = !!data.isAdmin;
    const items = data.requests || [];
    $("boardCount").textContent = items.length
      ? items.length + (items.length === 1 ? " request" : " requests")
      : "";
    if (!items.length) {
      board.innerHTML = '<p class="empty">No requests yet. Search above to add the first one!</p>';
      return;
    }
    board.innerHTML = "";
    for (const it of items) board.appendChild(reqRow(it));
  } catch (err) {
    board.innerHTML = '<p class="empty">' + esc(err.message) + "</p>";
  }
}

function reqRow(it) {
  const el = document.createElement("div");
  el.className = "req";
  const yr = yearOf(it.releaseDate);
  const sub = [yr, it.platform, "by " + it.requestedBy].filter(Boolean).join(" · ");
  const thumb = it.coverUrl
    ? '<img class="thumb" src="' + esc(it.coverUrl) + '" alt="" loading="lazy" />'
    : '<div class="thumb"></div>';
  const noteHtml = it.note ? '<div class="note">' + esc(it.note) + "</div>" : "";

  let adminHtml = "";
  if (IS_ADMIN) {
    const statuses = [["approved", "Approve"], ["fulfilled", "Fulfill"], ["declined", "Decline"], ["pending", "Reset"]];
    adminHtml = '<div class="admin">' +
      statuses
        .filter(([s]) => s !== it.status)
        .map(([s, lbl]) => '<button class="ghost small" data-status="' + s + '">' + lbl + "</button>")
        .join("") +
      "</div>";
  }

  el.innerHTML =
    '<div class="vote">' +
      '<button class="btn-vote' + (it.votedByMe ? " voted" : "") + '" title="Upvote">▲</button>' +
      '<span class="num">' + it.votes + "</span>" +
      '<span class="lbl">votes</span>' +
    "</div>" +
    thumb +
    '<div class="info">' +
      '<div class="t">' + esc(it.title) + ' <span class="badge ' + esc(it.status) + '">' + esc(it.status) + "</span></div>" +
      '<div class="sub">' + esc(sub) + "</div>" +
      noteHtml +
      adminHtml +
    "</div>";

  el.querySelector(".btn-vote").addEventListener("click", async (e) => {
    e.currentTarget.disabled = true;
    try {
      await api("/api/requests/" + it.id + "/vote", { method: "POST" });
      loadBoard();
    } catch (err) { toast(err.message); e.currentTarget.disabled = false; }
  });

  if (IS_ADMIN) {
    el.querySelectorAll(".admin button").forEach((b) => {
      b.addEventListener("click", async () => {
        try {
          await api("/api/requests/" + it.id + "/status", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: b.dataset.status }),
          });
          loadBoard();
        } catch (err) { toast(err.message); }
      });
    });
  }
  return el;
}

/* ---------------- Boot ---------------- */
checkSession();
</script>
</body>
</html>
