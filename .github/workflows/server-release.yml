name: Server Release

# Builds and publishes the backend server package from this repo's main branch.
on:
  push:
    branches: [main]
    tags:
      - "server-v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

# Opt every JavaScript action into the Node.js 24 runtime now, ahead of the
# 2026-06-16 forced cutover that retires Node.js 20 on GitHub-hosted runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    name: Package Server
    # Self-hosted Linux runner in the Proxmox CT (label `arcade-pve`). Build runs
    # natively on the runner (Debian 12 CT) — no Docker — so the toolchain is the
    # CT's own. Build deps are apt-installed each run (runner user has passwordless
    # sudo); Rust is provisioned by dtolnay/rust-toolchain.
    runs-on: [self-hosted, arcade-pve]
    if: github.ref_type == 'tag' || github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump server version
        id: ver
        shell: bash
        run: |
          author="$(git log -1 --format='%an')"
          is_tag="${{ github.ref_type }}"
          ver="$(tr -d '[:space:]' < VERSION)"
          IFS='.' read -r major minor patch <<< "$ver"

          echo "Current version : $major.$minor.$patch"
          echo "Triggered by tag: $is_tag   Author: $author"

          if [[ "$is_tag" != "tag" && "$author" != "github-actions[bot]" ]]; then
            msg="$(git log -1 --format='%s')"
            echo "Commit message  : $msg"
            if [[ "$msg" =~ \[major\] ]]; then
              major=$((major + 1)); minor=0; patch=0
              echo "Bump type       : MAJOR"
            elif [[ "$msg" =~ \[minor\] ]]; then
              minor=$((minor + 1)); patch=0
              echo "Bump type       : MINOR"
            else
              patch=$((patch + 1))
              echo "Bump type       : PATCH"
            fi

            printf "%s.%s.%s" "$major" "$minor" "$patch" > VERSION
            git add VERSION
            git commit -m "chore: bump server version to $major.$minor.$patch [skip actions]"
            git push origin HEAD:main
          fi

          ver="$major.$minor.$patch"
          tag="server-v$ver"
          echo "Server release version : $ver   Tag: $tag"
          echo "VERSION=$ver" >> "$GITHUB_OUTPUT"
          echo "TAG=$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure server release tag
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          git tag -f "${{ steps.ver.outputs.TAG }}"
          git push -f origin "${{ steps.ver.outputs.TAG }}"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake ca-certificates curl

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: server-release

      - name: Build Rust server (native)
        run: cargo build --release --locked

      - name: Package server tarball
        shell: bash
        run: |
          mkdir -p dist package/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}
          cp target/release/arcadelauncher-server package/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}/
          cp README.md .gitignore VERSION Cargo.toml Cargo.lock package/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}/
          cp -R src package/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}/
          cp -R deploy package/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}/
          chmod +x package/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}/arcadelauncher-server
          chmod +x package/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}/deploy/install-linux.sh
          tar -C package -czf dist/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}.tar.gz ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcadeLauncher-Server-${{ steps.ver.outputs.TAG }}
          path: dist/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ArcadeLauncher Server ${{ steps.ver.outputs.TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/ArcadeLauncher-Server-${{ steps.ver.outputs.VERSION }}.tar.gz
