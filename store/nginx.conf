# nginx config baked into the store image. Serves the built SPA and proxies the
# API surface to the in-cluster arcade-api Service so the browser talks to one
# origin (no CORS). SPA routing falls back to index.html.
#
# This runs INSIDE the cluster. The public edge nginx (10.0.0.203) still terminates
# TLS for arcade.orlandoaio.net and forwards to this pod's NodePort.
# WebSocket upgrade helper (this file is included inside the http{} block).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets: long cache for hashed files, no-cache for the HTML shell.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Large game-content transfers stream through this pod (the edge nginx points
    # its single upstream here), so match the edge's streaming/size settings.
    client_max_body_size 153600m;
    proxy_max_temp_file_size 153600m;

    # API + media proxied to the backend Service (cluster DNS).
    location ~ ^/(api|art|files|chunks|textures|ws|requests)(/|$) {
        proxy_pass http://arcade-api.arcade.svc.cluster.local:8721;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        # WebSocket upgrade for /ws/social.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
