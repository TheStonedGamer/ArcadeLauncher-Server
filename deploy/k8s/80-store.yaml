# Public storefront SPA (arcade.orlandoaio.net). An nginx pod serves the built
# React bundle and reverse-proxies /api,/art,/files,/chunks,/textures,/ws,/requests
# to the arcade-api Service, so the browser sees a single origin. TLS is terminated
# at the public edge nginx (10.0.0.203), which forwards to the NodePort below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-store
  namespace: arcade
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arcade-store
  template:
    metadata:
      labels:
        app: arcade-store
    spec:
      containers:
        - name: store
          image: brianthemint/arcadelauncher-store:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
            limits:   { memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: arcade-store
  namespace: arcade
spec:
  selector:
    app: arcade-store
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# Public entry point: the edge nginx (10.0.0.203) proxies arcade.orlandoaio.net to
# 10.0.0.112:30080. The store pod itself proxies the API paths onward, so the edge
# only needs this single upstream.
apiVersion: v1
kind: Service
metadata:
  name: arcade-store-nodeport
  namespace: arcade
spec:
  type: NodePort
  selector:
    app: arcade-store
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
