# Copy to 10-secret.yaml (gitignored) and fill in real values before applying.
# 10-secret.yaml must NEVER be committed. These are the only credentials the
# server reads; everything non-secret is in 11-config.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: arcade-secrets
  namespace: arcade
type: Opaque
stringData:
  # Shared client bearer token (matches the desktop/mobile client config).
  ARCADE_AUTH_TOKEN: "change-me-client-token"
  # Admin console credentials.
  ARCADE_ADMIN_USERNAME: "admin"
  ARCADE_ADMIN_PASSWORD: "change-me-admin-password"
  # MariaDB app-user password. Must match what the StatefulSet is initialised
  # with (20-mariadb.yaml MYSQL_PASSWORD) and the migrated dump's grants.
  ARCADE_DB_PASSWORD: "change-me-db-password"
  # MariaDB root password (used only by the StatefulSet init container).
  MARIADB_ROOT_PASSWORD: "change-me-db-root-password"
  # MinIO / S3 keys for DM attachments (existing feature, unchanged).
  ARCADE_S3_ACCESS_KEY: ""
  ARCADE_S3_SECRET_KEY: ""
  # coturn shared secret (must equal coturn static-auth-secret); blank disables.
  ARCADE_TURN_SECRET: ""
  # SMTP password for registration-approval mail; blank logs the links instead.
  ARCADE_SMTP_PASSWORD: ""
